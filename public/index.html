<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="חרשן - Proactive Spaced-Repetition Learning Hub — Master your lectures with SM-2 powered flashcards." />
  <title>חרשן</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <!-- ─── Top Navigation ─────────────────────────────── -->
  <nav id="topnav">
    <div style="display:flex; align-items:center; gap: 2rem;">
      <a href="#/" class="nav-brand">
        <span class="brand-icon">🧠</span>
        <span class="brand-text">חרשן</span>
      </a>
      <a href="#/community" style="color: var(--text); text-decoration: none; font-weight: 500;">קהילה</a>
    </div>
    <div style="display:flex; align-items:center; gap: 1rem;">
      <div id="nav-gamification" style="display: none; align-items: center; gap: 1rem; background: var(--bg-card); padding: 0.3rem 1rem; border-radius: 20px; border: 1px solid var(--border); font-size: 0.85rem;">
        <span title="Level & Title" id="nav-level" style="font-weight: 600; color: var(--primary);"></span>
        <span title="XP" id="nav-xp" style="color: var(--text-secondary);"></span>
        <span title="Daily Streak" id="nav-streak" style="color: #f59e0b; font-weight: bold;"></span>
        <span title="Community Reputation" id="nav-reputation" style="color: #10b981; font-weight: bold;"></span>
      </div>
      <span id="nav-greeting" style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500; display: none;"></span>
      <button id="btn-logout" class="btn btn-secondary" style="padding: 0.3rem 0.8rem; font-size: 0.85rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; color: var(--text);">התנתק</button>
    </div>
  </nav>

  <!-- ─── Main Content ───────────────────────────────── -->
  <main id="app"></main>

  <!-- ─── Toast Container ────────────────────────────── -->
  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/js/sm2.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
